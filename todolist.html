<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="todolist.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h1>My Tasks</h1>
      <span class="count"><span id="remaining">0</span> left</span>
    </header>

    <div class="input-section">
      <input type="text" id="taskInput" placeholder="Add a new task…" autocomplete="off">
      <button id="addBtn" aria-label="Add task">+</button>
    </div>

    <ul id="taskList"></ul>

    <div class="empty-state" id="emptyState">Nothing here yet.</div>

    <footer>
      <button id="clearCompleted">Clear completed</button>
    </footer>
  </div>
  <script src="todolist.js"></script>
</body>
</html>
